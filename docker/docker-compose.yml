# Shared app env — api, web, and gateway all call parseServerEnv() at runtime
# and need the full server schema. Keep one source of truth via a YAML anchor.
x-app-env: &app-env
  NODE_ENV: production
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DATABASE_URL: postgresql://${DB_USER:-caliber}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-caliber}
  AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
  NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
  # OAuth providers — at least ONE pair (Google or GitHub) must be filled in
  # `.env`; the env-schema check enforces it at boot. Empty fields are passed
  # through as "" and skipped by `buildProviders`, so operators can ship
  # Google-only, GitHub-only, or both.
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
  BOOTSTRAP_SUPER_ADMIN_EMAIL: ${BOOTSTRAP_SUPER_ADMIN_EMAIL:?required}
  BOOTSTRAP_DEFAULT_ORG_SLUG: ${BOOTSTRAP_DEFAULT_ORG_SLUG:?required}
  BOOTSTRAP_DEFAULT_ORG_NAME: ${BOOTSTRAP_DEFAULT_ORG_NAME:?required}
  # Surfaces gateway-aware UI + tRPC routes (usage, accounts, api-keys,
  # account-groups). Without this, api+web see ENABLE_GATEWAY=false and
  # gateway-aware routers short-circuit to NOT_FOUND, leaving the
  # dashboard pages mysteriously blank even when the gateway service
  # is up and writing usage_logs rows. Default false so the api+web-only
  # base profile still boots cleanly.
  ENABLE_GATEWAY: ${ENABLE_GATEWAY:-false}
  # Self-service Anthropic (Claude Max) OAuth. Off by default — the
  # resolveOAuthService gate returns NOT_FOUND for `anthropic` until this is
  # on, so the dashboard wizard's Anthropic option short-circuits. The four
  # ANTHROPIC_OAUTH_* overrides let an operator correct the best-known Claude
  # Code constants (authorize/token/redirect/scopes) if they ever drift, all
  # soft-default to empty so the in-code defaults apply when unset.
  ENABLE_ANTHROPIC_OAUTH: ${ENABLE_ANTHROPIC_OAUTH:-false}
  ANTHROPIC_OAUTH_AUTHORIZE_URL: ${ANTHROPIC_OAUTH_AUTHORIZE_URL:-}
  ANTHROPIC_OAUTH_TOKEN_URL: ${ANTHROPIC_OAUTH_TOKEN_URL:-}
  ANTHROPIC_OAUTH_REDIRECT_URI: ${ANTHROPIC_OAUTH_REDIRECT_URI:-}
  ANTHROPIC_OAUTH_SCOPES: ${ANTHROPIC_OAUTH_SCOPES:-}
  # Model-alias resolution knobs (default on / 3600s refresh; fallback
  # overrides are comma/space-separated id lists). Soft-default to empty
  # so the in-code defaults apply when unset.
  GATEWAY_ENABLE_MODEL_ALIAS: ${GATEWAY_ENABLE_MODEL_ALIAS:-true}
  GATEWAY_MODEL_REGISTRY_REFRESH_SEC: ${GATEWAY_MODEL_REGISTRY_REFRESH_SEC:-}
  GATEWAY_MODEL_REGISTRY_FALLBACK_ANTHROPIC: ${GATEWAY_MODEL_REGISTRY_FALLBACK_ANTHROPIC:-}
  GATEWAY_MODEL_REGISTRY_FALLBACK_OPENAI: ${GATEWAY_MODEL_REGISTRY_FALLBACK_OPENAI:-}
  # api_key credential-health knobs. Shared (not gateway-only) because the
  # gateway consumes MAX_FAIL/BACKOFF_SEC in the failover loop, but the api
  # container reads GRACE_SEC when accounts.rotate sets the post-rotation
  # grace window — so the operator's .env override must reach api too, or
  # rotations silently fall back to the in-code 120s default. Soft-default
  # to empty so the in-code defaults apply when unset.
  GATEWAY_UPSTREAM_AUTH_MAX_FAIL: ${GATEWAY_UPSTREAM_AUTH_MAX_FAIL:-}
  GATEWAY_UPSTREAM_AUTH_BACKOFF_SEC: ${GATEWAY_UPSTREAM_AUTH_BACKOFF_SEC:-}
  GATEWAY_UPSTREAM_AUTH_GRACE_SEC: ${GATEWAY_UPSTREAM_AUTH_GRACE_SEC:-}
  # When ENABLE_GATEWAY=true, parseServerEnv requires these four to be
  # present on every service that imports @caliber/config (api, web, and
  # gateway), not just the gateway container. Defaults are empty so
  # base-profile boots stay clean — when gateway is on, .env supplies
  # real values.
  GATEWAY_BASE_URL: ${GATEWAY_BASE_URL:-}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
  API_KEY_HASH_PEPPER: ${API_KEY_HASH_PEPPER:-}
  # Evaluator pipeline (Plan 4B/4C). Off by default — opting in
  # enables the body-capture queue (gateway), the evaluator cron,
  # the org `Evaluator` admin pages, and (if FACET_EXTRACTION too)
  # LLM-based facet enrichment of captured bodies. Per-org capture
  # toggle still requires an admin to flip `contentCaptureEnabled`
  # on the org via the Evaluator → Settings page after these are on.
  ENABLE_EVALUATOR: ${ENABLE_EVALUATOR:-false}
  ENABLE_FACET_EXTRACTION: ${ENABLE_FACET_EXTRACTION:-false}
  # Per-project (per-api-key) performance scoring (v0.17.0). Off by default.
  # ENABLE_PROJECT_EVALUATION turns on the per-key evaluator cron fan-out
  # (gateway); per-key scoring only runs for keys a member opts in via the
  # "Score as project" toggle AND that have traffic. The deep-analysis budget
  # enforcement (api+gateway) defaults on — disable with
  # EVALUATOR_BUDGET_ENFORCE_DEEP_ANALYSIS=false if a near-budget org sees
  # surprise halts. The two caps bound how many keys can be scored.
  ENABLE_PROJECT_EVALUATION: ${ENABLE_PROJECT_EVALUATION:-false}
  EVALUATOR_BUDGET_ENFORCE_DEEP_ANALYSIS: ${EVALUATOR_BUDGET_ENFORCE_DEEP_ANALYSIS:-true}
  # Independent GitHub delivery-scoring track (org fine-grained PAT → sync →
  # quant + LLM quality). Gates BOTH the api tRPC procedures (NOT_FOUND when
  # off) and the gateway sync/delivery worker pipeline, so it MUST reach both
  # containers via this anchor — setting it only in .env has no effect.
  ENABLE_GITHUB_DELIVERY: ${ENABLE_GITHUB_DELIVERY:-false}
  EVALUATOR_MAX_PROJECT_KEYS_PER_USER: ${EVALUATOR_MAX_PROJECT_KEYS_PER_USER:-20}
  MAX_PROJECT_KEYS_PER_ORG: ${MAX_PROJECT_KEYS_PER_ORG:-50}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-caliber}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-caliber}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-caliber} -d ${DB_NAME:-caliber}"]
      interval: 5s
      timeout: 5s
      retries: 20
    # Intentionally not publishing 5432 — api reaches postgres via the
    # internal compose network only.

  redis:
    # Always up (not gated by the `gateway` profile) so future features that
    # need a shared cache — sticky sessions, idempotency, rate limiting — can
    # reuse this instance without a second compose change.
    image: redis:7-alpine
    restart: unless-stopped
    # appendonly=yes persists to redis_data; gateway usage-log queue payloads
    # and billing audit state survive restarts.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    # Not publishing 6379 — gateway (and any future consumer) reaches redis
    # via the internal compose network only.

  migrate:
    image: ghcr.io/hanfour/caliber-api:${VERSION:?VERSION is required}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-caliber}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-caliber}
    command: ["node", "/app/dist/migrate.js"]

  api:
    image: ghcr.io/hanfour/caliber-api:${VERSION}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      PORT: 3001
    # Port 3001 stays internal — web proxies through the compose network.
    expose:
      - "3001"

  web:
    image: ghcr.io/hanfour/caliber-web:${VERSION}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *app-env
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Web proxies /trpc and /api/v1 to this internal URL via Next rewrites.
      # Browser only ever talks to the web origin, so cookies stay same-origin.
      API_INTERNAL_URL: http://api:3001
      # Auth.js v5 rejects any host outside its allowlist when NODE_ENV=production
      # unless trustHost is on. For self-hosted compose deploys (where the operator
      # owns NEXTAUTH_URL) the host *is* trusted by definition, so default to on
      # and let operators flip it off if they ever sit behind an untrusted proxy.
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
    ports:
      - "${WEB_PORT:-3000}:3000"

  gateway:
    # Opt-in service: `docker compose --profile gateway up` brings it up.
    # Keeps the base profile (api + web + postgres + migrate + redis) bootable
    # on hosts that don't need the customer-facing /v1/* proxy yet.
    profiles: [gateway]
    image: ghcr.io/hanfour/caliber-gateway:${VERSION:?VERSION is required}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
      GATEWAY_PORT: 3002
      ENABLE_GATEWAY: "true"
      REDIS_URL: redis://redis:6379
      # Gateway-only vars use soft defaults (`${VAR:-}`) instead of
      # `${VAR:?required}` because compose still interpolates this block even
      # when the `gateway` profile is inactive — making them strictly required
      # would break the base `docker compose up` flow for api+web-only
      # deploys. Validation happens inside the container: parseServerEnv
      # (@caliber/config) enforces URL + 64-char-hex shapes on boot, so a missing
      # or malformed value fails fast with a clear error.
      #
      # For file-backed secrets, swap these three lines for an `env_file:`
      # entry pointing at a non-tracked `.env.secrets`.
      GATEWAY_BASE_URL: ${GATEWAY_BASE_URL:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      API_KEY_HASH_PEPPER: ${API_KEY_HASH_PEPPER:-}
      # ── Operational tunables ────────────────────────────────────────────
      # All optional — parseServerEnv has sensible defaults so unset vars
      # boot fine. Override here when you need to tune for traffic shape
      # or compliance posture. See docs/GATEWAY.md §2 for the per-knob
      # reference + recommended starting values.
      GATEWAY_APIKEY_RPM_LIMIT: ${GATEWAY_APIKEY_RPM_LIMIT:-}
      GATEWAY_CACHE_TTL_SEC: ${GATEWAY_CACHE_TTL_SEC:-}
      GATEWAY_REDIS_FAILURE_MODE: ${GATEWAY_REDIS_FAILURE_MODE:-}
      GATEWAY_TRUSTED_PROXIES: ${GATEWAY_TRUSTED_PROXIES:-}
      GATEWAY_MAX_ACCOUNT_SWITCHES: ${GATEWAY_MAX_ACCOUNT_SWITCHES:-}
      GATEWAY_MAX_BODY_BYTES: ${GATEWAY_MAX_BODY_BYTES:-}
      GATEWAY_BUFFER_WINDOW_MS: ${GATEWAY_BUFFER_WINDOW_MS:-}
      GATEWAY_BUFFER_WINDOW_BYTES: ${GATEWAY_BUFFER_WINDOW_BYTES:-}
      GATEWAY_IDEMPOTENCY_TTL_SEC: ${GATEWAY_IDEMPOTENCY_TTL_SEC:-}
      GATEWAY_OAUTH_REFRESH_LEAD_MIN: ${GATEWAY_OAUTH_REFRESH_LEAD_MIN:-}
      GATEWAY_OAUTH_MAX_FAIL: ${GATEWAY_OAUTH_MAX_FAIL:-}
      # GATEWAY_UPSTREAM_AUTH_{MAX_FAIL,BACKOFF_SEC,GRACE_SEC} now live in the
      # shared x-app-env anchor (api reads GRACE_SEC on rotate) — inherited here
      # via `<<: *app-env`, so they're not re-declared in this block.
      GATEWAY_ANTHROPIC_OAUTH_TOKEN_URL: ${GATEWAY_ANTHROPIC_OAUTH_TOKEN_URL:-}
      # Issue #93 option B': enables keychain-re-read short-circuit on
      # OAuth refresh. Operator runs scripts/keychain-helper/install.sh
      # on the host, then sets these envs.
      #
      # Why TCP (not unix-socket): Docker Desktop on macOS bind-mounts
      # unix sockets through VirtioFS, which doesn't preserve socket
      # inode semantics — the file appears in the container but
      # connect() returns ECONNREFUSED. TCP via host.docker.internal
      # works reliably across Docker Desktop versions.
      # Both knobs default to empty (feature off). Set BOTH in .env to
      # enable: setting only the endpoint without the token path makes
      # the reader log "tokenPath required — disabled" and silently
      # falls through to direct anthropic refresh.
      GATEWAY_KEYCHAIN_HELPER_ENDPOINT: ${GATEWAY_KEYCHAIN_HELPER_ENDPOINT:-}
      GATEWAY_KEYCHAIN_HELPER_TOKEN_PATH: ${GATEWAY_KEYCHAIN_HELPER_TOKEN_PATH:-}
      GATEWAY_QUEUE_SATURATE_THRESHOLD: ${GATEWAY_QUEUE_SATURATE_THRESHOLD:-}
      UPSTREAM_ANTHROPIC_BASE_URL: ${UPSTREAM_ANTHROPIC_BASE_URL:-}
      UPSTREAM_OPENAI_BASE_URL: ${UPSTREAM_OPENAI_BASE_URL:-}
    # Mount the helper's bearer token (read-only, owner-only on host
    # → owner-only in container). Empty file is fine if helper isn't
    # installed — the keychainReader will warn + fall through to
    # direct anthropic refresh.
    volumes:
      - ${HOME}/.caliber/keychain.token:/run/caliber-keychain.token:ro
    # Lets the container reach the host helper via host.docker.internal
    # on Linux Docker Engine (works automatically on Docker Desktop).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Customer-facing /v1/messages and /v1/chat/completions endpoints.
      # Put a TLS-terminating reverse proxy in front in production.
      - "${GATEWAY_PORT:-3002}:3002"
    networks:
      default: {}
      tunnel:
        aliases:
          - gateway-tunnel

  cloudflared:
    # Opt-in: `docker compose --profile gateway --profile tunnel up`.
    # Named Cloudflare tunnel — exposes the gateway publicly without a per-user
    # VPN. Origin is configured (in the CF dashboard) to http://gateway-tunnel:3002
    # so traffic always reaches the gateway over the dedicated `tunnel` network.
    profiles: [tunnel]
    image: cloudflare/cloudflared:2026.5.2
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN:-}"]
    depends_on:
      gateway:
        condition: service_started
    networks:
      - tunnel

volumes:
  pg_data:
  redis_data:

networks:
  tunnel:
    driver: bridge
    # NOT internal: cloudflared needs egress to reach Cloudflare. Isolation
    # comes from only gateway + cloudflared joining this network.
