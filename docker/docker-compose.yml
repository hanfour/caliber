# Shared app env — api, web, and gateway all call parseServerEnv() at runtime
# and need the full server schema. Keep one source of truth via a YAML anchor.
x-app-env: &app-env
  NODE_ENV: production
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DATABASE_URL: postgresql://${DB_USER:-aide}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-aide}
  AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
  NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
  # OAuth providers — at least ONE pair (Google or GitHub) must be filled in
  # `.env`; the env-schema check enforces it at boot. Empty fields are passed
  # through as "" and skipped by `buildProviders`, so operators can ship
  # Google-only, GitHub-only, or both.
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
  BOOTSTRAP_SUPER_ADMIN_EMAIL: ${BOOTSTRAP_SUPER_ADMIN_EMAIL:?required}
  BOOTSTRAP_DEFAULT_ORG_SLUG: ${BOOTSTRAP_DEFAULT_ORG_SLUG:?required}
  BOOTSTRAP_DEFAULT_ORG_NAME: ${BOOTSTRAP_DEFAULT_ORG_NAME:?required}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-aide}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-aide}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aide} -d ${DB_NAME:-aide}"]
      interval: 5s
      timeout: 5s
      retries: 20
    # Intentionally not publishing 5432 — api reaches postgres via the
    # internal compose network only.

  redis:
    # Always up (not gated by the `gateway` profile) so future features that
    # need a shared cache — sticky sessions, idempotency, rate limiting — can
    # reuse this instance without a second compose change.
    image: redis:7-alpine
    restart: unless-stopped
    # appendonly=yes persists to redis_data; gateway usage-log queue payloads
    # and billing audit state survive restarts.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    # Not publishing 6379 — gateway (and any future consumer) reaches redis
    # via the internal compose network only.

  migrate:
    image: ghcr.io/hanfour/aide-api:${VERSION:?VERSION is required}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-aide}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-aide}
    command: ["node", "/app/dist/migrate.js"]

  api:
    image: ghcr.io/hanfour/aide-api:${VERSION}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      PORT: 3001
    # Port 3001 stays internal — web proxies through the compose network.
    expose:
      - "3001"

  web:
    image: ghcr.io/hanfour/aide-web:${VERSION}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *app-env
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Web proxies /trpc and /api/v1 to this internal URL via Next rewrites.
      # Browser only ever talks to the web origin, so cookies stay same-origin.
      API_INTERNAL_URL: http://api:3001
      # Auth.js v5 rejects any host outside its allowlist when NODE_ENV=production
      # unless trustHost is on. For self-hosted compose deploys (where the operator
      # owns NEXTAUTH_URL) the host *is* trusted by definition, so default to on
      # and let operators flip it off if they ever sit behind an untrusted proxy.
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
    ports:
      - "${WEB_PORT:-3000}:3000"

  gateway:
    # Opt-in service: `docker compose --profile gateway up` brings it up.
    # Keeps the base profile (api + web + postgres + migrate + redis) bootable
    # on hosts that don't need the customer-facing /v1/* proxy yet.
    profiles: [gateway]
    image: ghcr.io/hanfour/aide-gateway:${VERSION:?VERSION is required}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
      GATEWAY_PORT: 3002
      ENABLE_GATEWAY: "true"
      REDIS_URL: redis://redis:6379
      # Gateway-only vars use soft defaults (`${VAR:-}`) instead of
      # `${VAR:?required}` because compose still interpolates this block even
      # when the `gateway` profile is inactive — making them strictly required
      # would break the base `docker compose up` flow for api+web-only
      # deploys. Validation happens inside the container: parseServerEnv
      # (@aide/config) enforces URL + 64-char-hex shapes on boot, so a missing
      # or malformed value fails fast with a clear error.
      #
      # For file-backed secrets, swap these three lines for an `env_file:`
      # entry pointing at a non-tracked `.env.secrets`.
      GATEWAY_BASE_URL: ${GATEWAY_BASE_URL:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      API_KEY_HASH_PEPPER: ${API_KEY_HASH_PEPPER:-}
      # ── Operational tunables ────────────────────────────────────────────
      # All optional — parseServerEnv has sensible defaults so unset vars
      # boot fine. Override here when you need to tune for traffic shape
      # or compliance posture. See docs/GATEWAY.md §2 for the per-knob
      # reference + recommended starting values.
      GATEWAY_APIKEY_RPM_LIMIT: ${GATEWAY_APIKEY_RPM_LIMIT:-}
      GATEWAY_CACHE_TTL_SEC: ${GATEWAY_CACHE_TTL_SEC:-}
      GATEWAY_REDIS_FAILURE_MODE: ${GATEWAY_REDIS_FAILURE_MODE:-}
      GATEWAY_TRUSTED_PROXIES: ${GATEWAY_TRUSTED_PROXIES:-}
      GATEWAY_MAX_ACCOUNT_SWITCHES: ${GATEWAY_MAX_ACCOUNT_SWITCHES:-}
      GATEWAY_MAX_BODY_BYTES: ${GATEWAY_MAX_BODY_BYTES:-}
      GATEWAY_BUFFER_WINDOW_MS: ${GATEWAY_BUFFER_WINDOW_MS:-}
      GATEWAY_BUFFER_WINDOW_BYTES: ${GATEWAY_BUFFER_WINDOW_BYTES:-}
      GATEWAY_IDEMPOTENCY_TTL_SEC: ${GATEWAY_IDEMPOTENCY_TTL_SEC:-}
      GATEWAY_OAUTH_REFRESH_LEAD_MIN: ${GATEWAY_OAUTH_REFRESH_LEAD_MIN:-}
      GATEWAY_OAUTH_MAX_FAIL: ${GATEWAY_OAUTH_MAX_FAIL:-}
      GATEWAY_QUEUE_SATURATE_THRESHOLD: ${GATEWAY_QUEUE_SATURATE_THRESHOLD:-}
      UPSTREAM_ANTHROPIC_BASE_URL: ${UPSTREAM_ANTHROPIC_BASE_URL:-}
      UPSTREAM_OPENAI_BASE_URL: ${UPSTREAM_OPENAI_BASE_URL:-}
    ports:
      # Customer-facing /v1/messages and /v1/chat/completions endpoints.
      # Put a TLS-terminating reverse proxy in front in production.
      - "${GATEWAY_PORT:-3002}:3002"

volumes:
  pg_data:
  redis_data:
