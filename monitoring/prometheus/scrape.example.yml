# Sample Prometheus scrape config for Caliber.
#
# Drop into your existing prometheus.yml under `scrape_configs:`.
# For docker-compose self-hosting, the targets resolve via Docker's
# internal DNS — both services join the `default` network of the
# `caliber_default` compose project.

scrape_configs:
  - job_name: caliber-gateway
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          # Gateway exposes /metrics on the private port METRICS_PORT
          # (default 9464). For docker-compose the prometheus service
          # must share the same network so the loopback bind on
          # METRICS_HOST=127.0.0.1 is reachable, OR override METRICS_HOST
          # to the gateway container's internal IP / 0.0.0.0 with the
          # port NOT mapped to the host. The public listener on 3002
          # returns 401 for /metrics (audit 2026-05-20 finding #5).
          - "gateway:9464"
          # For Render / Fly / Railway: use the service's internal
          # network address with port 9464.

  - job_name: caliber-api
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - "api:3001"

  # Optional — if you run Prometheus's node-exporter, blackbox-exporter,
  # or cadvisor, add them here. The Caliber alert rules don't depend on
  # them but a healthy ops setup typically includes them.
