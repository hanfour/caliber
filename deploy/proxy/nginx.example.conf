# Nginx config for aide.
#
# Drop into /etc/nginx/sites-available/ and `ln -s` into sites-enabled,
# OR drop into /etc/nginx/conf.d/aide.conf depending on your distro.
#
# Assumes you've already provisioned TLS certs (Let's Encrypt + certbot
# or equivalent). The certbot-managed paths below are typical; adjust
# for your setup.
#
# Two public origins:
#   - aide.example.com    → web (admin UI)
#   - gateway.example.com → gateway (customer SDK target)
#
# The api service is internal-only and not exposed.

# ── Shared upstream definitions ─────────────────────────────────────────
upstream aide_web {
    server aide-web:3000;
    keepalive 16;
}

upstream aide_gateway {
    server aide-gateway:3002;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name aide.example.com gateway.example.com;
    return 301 https://$host$request_uri;
}

# ── Web (admin UI) ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aide.example.com;

    ssl_certificate     /etc/letsencrypt/live/aide.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aide.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    # Long polling / SSE on the admin side (e.g. evaluator status)
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout 30s;

    location / {
        proxy_pass http://aide_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_buffering off;
    }

    access_log /var/log/nginx/aide-web.access.log;
    error_log  /var/log/nginx/aide-web.error.log warn;
}

# ── Gateway (customer SDK target) ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gateway.example.com;

    ssl_certificate     /etc/letsencrypt/live/gateway.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gateway.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Match GATEWAY_MAX_BODY_BYTES (default 10 MiB).
    client_max_body_size 10M;

    # SSE streaming runs long — give it room.
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout 30s;

    location / {
        proxy_pass http://aide_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical for SSE: disable proxy buffering and chunked
        # response buffering so each `data: ...\n\n` event reaches
        # the client immediately. Without this, streaming responses
        # accumulate in nginx's 4-8 KiB buffer and arrive in bursts.
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        # Disable HTTP/1.0 keep-alive for the upstream (long
        # idle-keep can wedge the gateway worker pool when nginx
        # holds many idle backend connections).
        proxy_set_header Connection "";
    }

    access_log /var/log/nginx/aide-gateway.access.log;
    error_log  /var/log/nginx/aide-gateway.error.log warn;
}
