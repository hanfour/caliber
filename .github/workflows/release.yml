name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        # arm64 dropped from every image: QEMU cross-build hangs
        # indefinitely (>2h) on GitHub Actions runners. Closes #98 (api,
        # v0.4.4/v0.4.5) and the v0.4.9 gateway hang (2h+ stuck on the
        # gateway job while api/web completed in ~3min).
        #
        # Earlier the workflow kept gateway multi-arch on the assumption
        # its dep tree was lean enough for QEMU to handle. That stopped
        # being true; the gateway image now hangs the same way api / web
        # did. arm64 hosts run all three tiers under amd64 emulation,
        # which is what mac-mini/h4 already do.
        include:
          - image: api
            platforms: linux/amd64
          - image: gateway
            platforms: linux/amd64
          - image: web
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive repo-owner-lowercased
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.image }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/caliber-${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.name }}/caliber-${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false

  release:
    name: GitHub Release
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
